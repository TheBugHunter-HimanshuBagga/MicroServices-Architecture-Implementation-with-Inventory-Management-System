management:
  health:
    circuitbreakers:
      enabled:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always


resilience4j:
  retry:
    instances:
      inventoryRetry:
        maxRetryAttempts: 3
        waitDuration: 100ms

  ratelimiter:
    instances:
      inventoryRateLimiter:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 10ms

  circuitbreaker:
    instances:
      inventoryRateLimiter:
        registerHealthIndicator: true   # Expose circuit breaker health via the actuator
        slidingWindowSize: 10           # Size of the sliding window for call recording
        slidingWindowType: COUNT_BASED  # Use count-based sliding window
        minimumNumberOfCalls: 10        # Minimum number of calls before calculating failure rate
        failureRateThreshold: 50        # If 50% (5 out of 10) calls fail, circuit opens
        waitDurationInOpenState: 20s    # Time the circuit stays OPEN before moving to HALF_OPEN
        permittedNumberOfCallsInHalfOpenState: 3  # Test calls allowed in HALF_OPEN state
        eventConsumerBufferSize: 10     # Buffer size for event logs


