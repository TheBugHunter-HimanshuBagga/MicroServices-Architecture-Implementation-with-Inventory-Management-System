jwt:
  secretKey : aswdefxcdbhfnkghd

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
            - RedirectTo=302, http://youtube.com
            - name: LoggingOrdersFilter
            - name: Authentication
              args:
                isEnabled: false
            - name: Authorization
              args:
                allowedRoles: ADMIN, SUPER_ADMIN

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=2
            - RedirectTo=302, http://youtube.com
            - name: Authentication

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka